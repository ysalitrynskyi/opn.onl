name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - security-audit-fixes

# Cancel in-progress runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend (cargo test + clippy)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opn_onl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/opn_onl_test
      # CI-only secret; must be >= 32 bytes to satisfy the new startup validation.
      JWT_SECRET: ci-test-jwt-secret-please-change-in-production-0123456789
      RUST_LOG: warn
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Clippy (non-blocking)
        working-directory: backend
        run: cargo clippy --all-targets || true

      - name: Run tests
        working-directory: backend
        run: cargo test --all-features

  frontend-test:
    name: Frontend (vitest + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Unit tests
        working-directory: frontend
        run: npm run test -- --run

      # Typecheck (blocking). The full prerender build (which needs Chromium/
      # Puppeteer) is exercised by the Docker image workflow, not this fast gate.
      - name: Typecheck
        working-directory: frontend
        run: npx tsc -b
