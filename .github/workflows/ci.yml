name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - security-audit-fixes

# Cancel in-progress runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend (cargo test + clippy)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opn_onl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/opn_onl_test
      # CI-only secret; must be >= 32 bytes to satisfy the new startup validation.
      JWT_SECRET: ci-test-jwt-secret-please-change-in-production-0123456789
      RUST_LOG: warn
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Clippy (non-blocking)
        working-directory: backend
        run: cargo clippy --all-targets || true

      - name: Run tests
        working-directory: backend
        run: cargo test --all-features

  frontend-test:
    name: Frontend (vitest + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Unit tests
        working-directory: frontend
        run: npm run test -- --run

      # Typecheck (blocking). The full prerender build (which needs Chromium/
      # Puppeteer) is exercised by the Docker image workflow, not this fast gate.
      - name: Typecheck
        working-directory: frontend
        run: npx tsc -b

  frontend-production-smoke:
    name: Frontend production headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production nginx configuration
        run: >-
          docker build
          --target csp-config
          --build-arg VITE_API_URL=https://api.smoke.test
          --tag opn-frontend-csp-smoke
          frontend

      - name: Verify served security headers
        run: |
          container_id=$(docker run --detach --publish 127.0.0.1:8080:80 opn-frontend-csp-smoke)
          trap 'docker rm --force "$container_id"' EXIT

          for attempt in $(seq 1 20); do
            if headers=$(curl --fail --silent --show-error --head http://127.0.0.1:8080/); then
              break
            fi
            sleep 1
          done

          test -n "${headers:-}"
          printf '%s\n' "$headers" | grep -iF "content-security-policy:"
          printf '%s\n' "$headers" | grep -iF "script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://static.cloudflareinsights.com;"
          printf '%s\n' "$headers" | grep -iF "connect-src 'self' https://api.smoke.test wss://api.smoke.test https://www.google-analytics.com https://region1.google-analytics.com https://www.google.com https://cloudflareinsights.com;"
          printf '%s\n' "$headers" | grep -iF "strict-transport-security: max-age=63072000; includeSubDomains"
          ! printf '%s\n' "$headers" | grep -Fq '__API_CONNECT_SRC__'
          ! docker exec "$container_id" grep -Rq '__API_CONNECT_SRC__' /etc/nginx/conf.d
          ! grep -R "fonts.googleapis.com" frontend/src
