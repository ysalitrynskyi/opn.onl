name: Build and Push Docker Images

on:
  push:
    branches: [release]
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-backend:
    name: Build Backend (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set platform suffix
        id: platform
        run: |
          if [ "${{ matrix.platform }}" = "linux/amd64" ]; then
            echo "suffix=amd64" >> $GITHUB_OUTPUT
          else
            echo "suffix=arm64" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/opn-backend
          # Disable flavor latest=auto — otherwise a vX.Y.Z tag build tags
          # each single-arch image as :latest and stomps the multi-arch index.
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest-${{ steps.platform.outputs.suffix }},enable=${{ github.ref == 'refs/heads/release' }}
            type=ref,event=branch,suffix=-${{ steps.platform.outputs.suffix }}
            # Per-platform semver tags; the create-manifests job merges them
            # into a single multi-arch :X.Y.Z (and :latest) manifest.
            type=semver,pattern={{version}},suffix=-${{ steps.platform.outputs.suffix }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.platform }}
          provenance: false

  build-frontend:
    name: Build Frontend (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set platform suffix
        id: platform
        run: |
          if [ "${{ matrix.platform }}" = "linux/amd64" ]; then
            echo "suffix=amd64" >> $GITHUB_OUTPUT
          else
            echo "suffix=arm64" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/opn-frontend
          # Disable flavor latest=auto — otherwise a vX.Y.Z tag build tags
          # each single-arch image as :latest and stomps the multi-arch index.
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest-${{ steps.platform.outputs.suffix }},enable=${{ github.ref == 'refs/heads/release' }}
            type=ref,event=branch,suffix=-${{ steps.platform.outputs.suffix }}
            # Per-platform semver tags; the create-manifests job merges them
            # into a single multi-arch :X.Y.Z (and :latest) manifest.
            type=semver,pattern={{version}},suffix=-${{ steps.platform.outputs.suffix }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL || 'https://l.opn.onl' }}
            VITE_FRONTEND_URL=${{ secrets.VITE_FRONTEND_URL || 'https://opn.onl' }}
            VITE_GA_ID=${{ secrets.VITE_GA_ID }}
          cache-from: type=gha,scope=frontend-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=frontend-${{ matrix.platform }}
          provenance: false

  create-manifests:
    name: Create Multi-Arch Manifests
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: success()
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push backend manifest
        if: github.ref == 'refs/heads/release'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ github.repository_owner }}/opn-backend:latest \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/opn-backend:latest-amd64 \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/opn-backend:latest-arm64

      - name: Create and push frontend manifest
        if: github.ref == 'refs/heads/release'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ github.repository_owner }}/opn-frontend:latest \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/opn-frontend:latest-amd64 \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/opn-frontend:latest-arm64

      - name: Create and push semver manifests
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for image in opn-backend opn-frontend; do
            docker buildx imagetools create \
              --tag ${{ env.REGISTRY }}/${{ github.repository_owner }}/$image:$VERSION \
              ${{ env.REGISTRY }}/${{ github.repository_owner }}/$image:$VERSION-amd64 \
              ${{ env.REGISTRY }}/${{ github.repository_owner }}/$image:$VERSION-arm64
            # Keep rolling :latest as a multi-arch index pointing at this release
            # (must not push single-arch :latest from the build jobs — see flavor).
            docker buildx imagetools create \
              --tag ${{ env.REGISTRY }}/${{ github.repository_owner }}/$image:latest \
              ${{ env.REGISTRY }}/${{ github.repository_owner }}/$image:$VERSION-amd64 \
              ${{ env.REGISTRY }}/${{ github.repository_owner }}/$image:$VERSION-arm64
          done

      - name: Verify :latest is multi-arch (amd64 + arm64)
        if: github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          for image in opn-backend opn-frontend; do
            ref="${{ env.REGISTRY }}/${{ github.repository_owner }}/$image:latest"
            platforms="$(docker buildx imagetools inspect "$ref" \
              --format '{{range .Manifest.Manifests}}{{.Platform.OS}}/{{.Platform.Architecture}} {{end}}')"
            echo "$ref => $platforms"
            echo "$platforms" | grep -q 'linux/amd64' || { echo "ERROR: $ref missing linux/amd64"; exit 1; }
            echo "$platforms" | grep -q 'linux/arm64' || { echo "ERROR: $ref missing linux/arm64"; exit 1; }
            # Single-arch manifest.v2 has empty Manifests — catch that too.
            [ -n "$(echo "$platforms" | tr -d '[:space:]')" ] || {
              echo "ERROR: $ref is not a multi-arch index"
              exit 1
            }
          done

  cleanup:
    name: Prune Old GHCR Versions
    runs-on: ubuntu-latest
    needs: [create-manifests]
    # Only prune on release builds, after the :latest manifest has been
    # (re)created — so the multi-arch children it references are preserved.
    if: github.ref == 'refs/heads/release'
    permissions:
      packages: write
    steps:
      - name: Delete untagged + stale versions
        uses: dataaxiom/ghcr-cleanup-action@v1.2.2
        with:
          packages: opn-backend,opn-frontend
          owner: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          # Remove orphaned untagged digests left behind by each build.
          delete-untagged: true
          # Also tidy multi-arch images whose platform children went missing.
          delete-ghost-images: true
          delete-partial-images: true
          # Keep the 10 most recent tagged versions (e.g. semver releases)…
          keep-n-tagged: 10
          # …and never delete the rolling production tags.
          exclude-tags: latest,latest-amd64,latest-arm64

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, create-manifests]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.build-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Manifests | ${{ needs.create-manifests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Multi-Arch Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository_owner }}/opn-backend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository_owner }}/opn-frontend:latest\`" >> $GITHUB_STEP_SUMMARY
