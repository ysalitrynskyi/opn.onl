# Preserve original X-Forwarded-Proto from upstream (Cloudflare)
# If not set, default to $scheme
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Resolver for dynamic proxy_pass (required for Docker internal DNS)
    resolver 127.0.0.11 valid=30s ipv6=off;
    
    # Backend API URL
    set $backend_url "http://backend:3000";

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Security headers.
    #
    # NOTE ON INHERITANCE: nginx only inherits `add_header` from an outer scope
    # when the inner scope defines NO add_header of its own. Any `location` that
    # adds its own header (e.g. Cache-Control below) therefore drops ALL of these
    # unless it repeats them — which is why the static-asset block re-declares the
    # full set. Keep the two lists in sync.
    #
    # CSP keeps 'unsafe-inline'/'unsafe-eval' because the SPA and prerendered
    # pages rely on inline scripts/styles; the real hardening here is
    # connect-src, restricted to 'self' plus the API origin. The frontend fetches
    # the backend cross-origin (VITE_API_URL, e.g. https://l.opn.onl), so that
    # origin MUST be allowed here or every API call is blocked and the app can
    # load no data. The placeholder below is replaced at image-build time with
    # VITE_API_URL and its wss:// form (see frontend/Dockerfile), derived from the
    # same build arg the JS bundle uses so the two can never drift. Google
    # Analytics is loaded only after explicit consent; Cloudflare Browser Insights
    # is injected at the edge. Fonts are self-hosted. Keep analytics sources
    # explicit so connect-src still blocks exfiltration to every other host.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' __API_CONNECT_SRC__ https://www.google-analytics.com https://region1.google-analytics.com https://cloudflareinsights.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Health check endpoint (exact match, highest priority)
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Cache static assets. This block defines its own add_header, so it must
    # repeat the security headers above (nginx add_header inheritance rule).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' __API_CONNECT_SRC__ https://www.google-analytics.com https://region1.google-analytics.com https://cloudflareinsights.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        access_log off;
        try_files $uri =404;
    }

    # Explicitly handle SPA routes (prevents short-link regex from matching)
    # These are known frontend routes that should serve their prerendered HTML.
    # Serve the route's own prerendered file (e.g. /features/index.html) for
    # correct per-page SEO (title/canonical/JSON-LD); fall back to the SPA shell
    # for app routes that aren't prerendered (dashboard, settings, admin, …).
    location ~ ^/(dashboard|login|register|settings|analytics|features|pricing|developers|about|privacy|terms|contact|faq|docs|admin|verify-email|forgot-password|reset-password)(/.*)?$ {
        try_files $uri $uri/index.html /index.html;
    }

    # Password page for protected links (SPA page)
    # Supports short codes (6 chars) and custom aliases (up to 50 chars)
    location ~ "^/password/([a-zA-Z0-9]{4,50})$" {
        try_files /index.html =404;
    }

    # Password verification API - proxy to backend
    location ~ "^/([a-zA-Z0-9]{4,50})/verify$" {
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Link preview - proxy to backend
    location ~ "^/([a-zA-Z0-9]{4,50})/preview$" {
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Short link redirects - proxy to backend for fast, bot-followable 302s.
    # The backend itself diverts safe-link-interstitial links to the SPA route
    # /r/<code> (handled by `location /`), so normal links never load the app.
    # Supports short codes (6 chars) and custom aliases (up to 50 chars).
    # This MUST come after the more specific rules above
    location ~ "^/([a-zA-Z0-9]{4,50})$" {
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;

        # Don't pass errors to client immediately
        proxy_intercept_errors off;
    }

    # Handle SPA routing - all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
